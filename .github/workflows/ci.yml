name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint & Guard
    runs-on: ubuntu-latest

    steps:
      # ── checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history for gitleaks to scan all commits on the push.
          fetch-depth: 0

      # ── Node.js (needed by check-version.sh and JSON validation) ────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 1. JSON validity ─────────────────────────────────────────────────────
      - name: Validate JSON — plugin.json
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8')); console.log('OK');"

      - name: Validate JSON — marketplace.json
        run: node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')); console.log('OK');"

      # ── 2. Version consistency ───────────────────────────────────────────────
      - name: Check version consistency
        run: bash scripts/check-version.sh

      # ── 3. Frontmatter validation ────────────────────────────────────────────
      - name: Check frontmatter (agents + skills)
        run: bash scripts/check-frontmatter.sh

      # ── 4. Shell script linting ──────────────────────────────────────────────
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint install.sh with shellcheck
        # Block on warning+ (real bugs); info/style nags are advisory, not blocking.
        run: shellcheck --severity=warning install.sh

      - name: Syntax-check install.sh
        run: bash -n install.sh

      - name: Syntax-check scripts/check-version.sh
        run: bash -n scripts/check-version.sh

      - name: Syntax-check scripts/check-frontmatter.sh
        run: bash -n scripts/check-frontmatter.sh

      - name: Syntax-check scripts/release.sh
        run: bash -n scripts/release.sh

      # ── 5. Secret scan ───────────────────────────────────────────────────────
      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # gitleaks-action reads .gitleaks.toml automatically from repo root.

      # ── 6. Markdown link check (advisory) ───────────────────────────────────
      - name: Check markdown links
        uses: lycheeverse/lychee-action@v2
        continue-on-error: true
        with:
          args: >
            --exclude-loopback
            --exclude-mail
            --timeout 20
            --max-retries 2
            '**/*.md'
          fail: false
